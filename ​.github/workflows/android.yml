name: Build APK Supreme
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Máy chủ sẽ tự động tạo toàn bộ mã nguồn Android tại đây
      - name: Generate Android Project
        run: |
          mkdir -p app/src/main/java/com/tts/app
          mkdir -p app/src/main/res/values

          echo "rootProject.name = 'TTSApp'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

          echo "plugins { id 'com.android.application' }" > app/build.gradle
          echo "android { compileSdk 33; namespace 'com.tts.app'; defaultConfig { applicationId 'com.tts.app'; minSdk 24; targetSdk 33; versionCode 1; versionName '1.0' } }" >> app/build.gradle

          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Ngoc Tram TTS"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

          echo 'package com.tts.app; import android.app.Activity; import android.os.Bundle; import android.webkit.WebView; public class MainActivity extends Activity { @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); WebView webView = new WebView(this); setContentView(webView); webView.getSettings().setJavaScriptEnabled(true); webView.loadUrl("https://google.com"); } }' > app/src/main/java/com/tts/app/MainActivity.java

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK Command
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Tramthu1986-APK
          path: app/build/outputs/apk/debug/*.apk

